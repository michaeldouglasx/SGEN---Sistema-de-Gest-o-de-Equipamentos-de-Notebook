{% extends 'base.html' %}

{% block title %}Login | SGEN{% endblock %}

{% block content %}
<section class="card card-login">
    <h2>Entrar no SGEN</h2>
    <p class="descricao">Use seu login institucional para continuar.</p>

    <form method="post" class="formulario-padrao" action="#">
        {% csrf_token %}

        <div class="campo">
            <label for="id_login">Usuário</label>
            <input id="id_login" type="text" name="login" placeholder="Digite seu usuário" required>
        </div>

        <div class="campo">
            <label for="id_password">Senha</label>
            <input id="id_password" type="password" name="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-principal">Entrar</button>
    </form>
</section>
{% endblock %}
